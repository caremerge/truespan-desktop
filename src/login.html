<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truespan Neighborhood - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1C1463 0%, #1C42FF 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Custom Scrollbars */
        * {
            scrollbar-width: thin;
            scrollbar-color: #888 #f1f1f1;
        }

        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        *::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        *::-webkit-scrollbar-corner {
            background: #f1f1f1;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 200px;
            height: auto;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #1C1463;
            font-size: 28px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #1C42FF;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            transform: scale(1.2);
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-size: 14px;
            color: #666;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1C1463 0%, #1C42FF 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .update-actions {
            margin-top: 12px;
            text-align: center;
        }

        .check-updates-btn {
            background: transparent;
            border: 1px solid rgba(28, 66, 255, 0.4);
            color: #1C42FF;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .check-updates-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .update-status {
            color: #1C1463;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: #f5f7ff;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid rgba(28, 66, 255, 0.2);
        }

        .auto-login-message {
            color: #1C42FF;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: rgba(28, 66, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(28, 66, 255, 0.3);
        }

        .auto-login-message .spinner {
            border-top-color: #1C42FF;
        }


        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1C42FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="../assets/logo-big-login-page.png" alt="Truespan Neighborhood" onerror="this.style.display='none';" />
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In
            </button>

            <div class="loading" id="loading">
                <span class="spinner"></span>
                Signing in...
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="update-status" id="updateStatus"></div>
            <div class="update-actions">
                <button type="button" class="check-updates-btn" id="checkUpdatesBtn">
                    Check for updates
                </button>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="forgotPasswordLink" style="color: #1C42FF; text-decoration: none; font-size: 14px;">Forgot Password?</a>
            </div>

            <div class="auto-login-message" id="autoLoginMessage">
                <span class="spinner"></span>
                Signing in automatically...
                <br>
                <a href="#" id="cancelAutoLogin" style="color: #1C42FF; text-decoration: underline; font-size: 12px; margin-top: 5px; display: inline-block;">Use different account</a>
            </div>
        </form>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Flag to prevent multiple simultaneous login attempts
        let isLoggingIn = false;

        async function loadStoredCredentials() {
            let keytarAvailable = false;
            try {
                const stored = await ipcRenderer.invoke('get-stored-credentials');
                keytarAvailable = !!(stored && stored.keytarAvailable);
                if (stored && stored.username) {
                    return {
                        username: stored.username,
                        password: stored.password || '',
                        source: 'keytar',
                        keytarAvailable
                    };
                }
            } catch (error) {
                console.warn('Keytar unavailable, falling back to localStorage:', error);
            }

            const storedUsername = localStorage.getItem('truespanUsername');
            const storedPassword = localStorage.getItem('truespanPassword') || '';
            if (storedUsername) {
                return {
                    username: storedUsername,
                    password: storedPassword,
                    source: 'localStorage',
                    keytarAvailable
                };
            }

            return { username: '', password: '', source: null, keytarAvailable };
        }

        async function saveStoredCredentials(username, password) {
            try {
                const result = await ipcRenderer.invoke('set-stored-credentials', { username, password });
                if (result && result.saved) {
                    localStorage.removeItem('truespanUsername');
                    localStorage.removeItem('truespanPassword');
                    return true;
                }
            } catch (error) {
                console.error('Error saving credentials to keytar:', error);
            }

            // Fallback to localStorage
            localStorage.setItem('truespanUsername', username);
            localStorage.setItem('truespanPassword', password);
            return false;
        }

        async function clearStoredCredentials() {
            try {
                await ipcRenderer.invoke('clear-stored-credentials');
            } catch (error) {
                console.error('Error clearing credentials from keytar:', error);
            }

            localStorage.removeItem('truespanUsername');
            localStorage.removeItem('truespanPassword');
        }

        // Load stored credentials on startup (keytar first, localStorage fallback)
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('Login page loaded');
            
            try {
                const stored = await loadStoredCredentials();
                
                if (stored.username) {
                    console.log('Found stored credentials, pre-filling form...');
                    
                    // Pre-fill the form fields
                    document.getElementById('username').value = stored.username;
                    if (stored.password) {
                        document.getElementById('password').value = stored.password;
                    }
                    document.getElementById('rememberMe').checked = true;
                    
                    // Focus password field if it's empty, otherwise focus Sign In button
                    if (!stored.password) {
                        document.getElementById('password').focus();
                    }
                }

                // Migrate from localStorage to keytar when available
                if (stored.source === 'localStorage' && stored.keytarAvailable) {
                    const migrated = await ipcRenderer.invoke('set-stored-credentials', {
                        username: stored.username,
                        password: stored.password || ''
                    });
                    if (migrated && migrated.saved) {
                        localStorage.removeItem('truespanUsername');
                        localStorage.removeItem('truespanPassword');
                    }
                }
            } catch (error) {
                console.error('Error loading stored credentials:', error);
            }
        });

        ipcRenderer.on('update-status', (_event, payload) => {
            const statusDiv = document.getElementById('updateStatus');
            if (!statusDiv || !payload || !payload.show) {
                return;
            }
            const details = payload.details ? ` (${payload.details})` : '';
            statusDiv.textContent = `${payload.status}${details}`;
            statusDiv.style.display = 'block';
        });

        document.getElementById('checkUpdatesBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('updateStatus');
            if (statusDiv) {
                statusDiv.textContent = 'checking-for-update';
                statusDiv.style.display = 'block';
            }
            await ipcRenderer.invoke('check-for-updates');
        });

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Prevent multiple simultaneous login attempts
            if (isLoggingIn) {
                console.log('Login already in progress, ignoring duplicate submission');
                return;
            }
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            isLoggingIn = true;
            setLoading(true);
            hideError();
            hideAutoLoginMessage();

            try {
                // Save credentials if "Remember Me" is checked (keytar first, localStorage fallback)
                if (rememberMe) {
                    const savedToKeytar = await saveStoredCredentials(username, password);
                    console.log(savedToKeytar ? 'Credentials saved to keytar' : 'Credentials saved to localStorage');
                } else {
                    await clearStoredCredentials();
                }

                const result = await ipcRenderer.invoke('login', {
                    username,
                    password,
                    rememberMe: false  // Don't pass to backend since we handle it in frontend
                });

                console.log('Login result received:', result);

                if (result.success) {
                    console.log('Login successful');
                    // Login successful - main window will open and login window will close
                    // Keep button disabled and isLoggingIn=true until window closes
                } else {
                    console.log('Login failed:', result);
                    showError(result.error || 'Login failed');
                    // Re-enable the button on failure
                    isLoggingIn = false;
                    setLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An unexpected error occurred');
                // Re-enable the button on error
                isLoggingIn = false;
                setLoading(false);
            }
        });

        // Handle remember me checkbox
        document.getElementById('rememberMe').addEventListener('change', (e) => {
            if (!e.target.checked) {
                // Clear stored credentials if unchecking remember me
                try {
                    clearStoredCredentials();
                    console.log('Credentials cleared');
                } catch (error) {
                    console.error('Error clearing credentials:', error);
                }
            }
        });

        function setLoading(loading) {
            const loginBtn = document.getElementById('loginBtn');
            const loadingDiv = document.getElementById('loading');
            
            if (loading) {
                loginBtn.disabled = true;
                loginBtn.textContent = 'Signing In...';
                loadingDiv.style.display = 'block';
            } else {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                loadingDiv.style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
        }

        function showAutoLoginMessage() {
            const autoLoginDiv = document.getElementById('autoLoginMessage');
            autoLoginDiv.style.display = 'block';
            
            // Hide other messages
            hideError();
            document.getElementById('loading').style.display = 'none';
        }

        function hideAutoLoginMessage() {
            const autoLoginDiv = document.getElementById('autoLoginMessage');
            autoLoginDiv.style.display = 'none';
        }


        // Handle Enter key on password field
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // Handle Forgot Password link
        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            ipcRenderer.invoke('open-forgot-password');
        });
    </script>
</body>
</html>
