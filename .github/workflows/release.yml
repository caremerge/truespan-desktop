name: Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      sign_windows:
        description: 'Enable Windows e-signing (eSigner)'
        required: false
        default: 'false'

permissions:
  contents: write  # Allow creating releases and uploading assets

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      LEGACY_RELEASE_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
      LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v1.0.0-dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Truespan Neighborhood ${{ steps.get_version.outputs.version }}
          body: |
            ## Truespan Neighborhood Desktop Application
            
            ### Downloads
            - **macOS** (Universal - Intel & Apple Silicon): `Truespan Neighborhood-${{ steps.get_version.outputs.version }}-universal.dmg`
            - **Windows**: `Truespan Neighborhood Setup ${{ steps.get_version.outputs.version }}.exe`
            
            ### Changes
            - ✅ Cross-platform desktop application
            - ✅ Properly signed and notarized
            - ✅ Universal macOS binary
            
            ### Installation
            
            **macOS:**
            1. Download the DMG file
            2. Open and drag app to Applications or Desktop
            3. First launch: Right-click → Open (to bypass Gatekeeper)
            
            **Windows:**
            1. Download the Setup.exe file
            2. Run the installer
            3. Follow installation wizard
          draft: false
          prerelease: false

      - name: Create legacy release (optional)
        if: ${{ env.LEGACY_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
          LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
        run: |
          TAG="${{ steps.get_version.outputs.version }}"
          LEGACY_REPO="${LEGACY_RELEASE_REPO:-ryangalea23/truespan}"
          echo "Ensuring legacy release exists for $LEGACY_REPO ($TAG)"
          if ! gh release view "$TAG" --repo "$LEGACY_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$LEGACY_REPO" \
              --title "Truespan Neighborhood $TAG" \
              --notes "Bridge release to move updates to caremerge/truespan."
          fi

  build-mac:
    needs: create-release
    runs-on: macos-latest
    env:
      LEGACY_RELEASE_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
      LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify icon files
        run: ls -lh assets/icon.png assets/icon.ico
      
      - name: Clean previous builds
        run: |
          echo "Cleaning dist folder and build cache..."
          rm -rf dist
          rm -rf node_modules/.cache
          echo "Clean complete"
      
      - name: Import Apple certificates
        env:
          APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          echo "$APPLE_CERT_DATA" > cert_base64.txt
          base64 --decode -i cert_base64.txt -o certificate.p12
          
          openssl pkcs12 -in certificate.p12 -clcerts -nokeys -out cert.pem -passin pass:"$APPLE_CERT_PASSWORD"
          openssl pkcs12 -in certificate.p12 -nocerts -nodes -out key.pem -passin pass:"$APPLE_CERT_PASSWORD"
          openssl pkcs12 -export -out new_certificate.p12 -inkey key.pem -in cert.pem -passout pass:"$APPLE_CERT_PASSWORD" -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1
          
          security import new_certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          rm certificate.p12
      
      - name: Build and sign macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --publish never

      - name: Locate DMG
        id: find_dmg
        run: |
          DMG_PATH=$(find dist -maxdepth 2 -name "*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "DMG not found in dist/"
            exit 1
          fi
          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
      
      - name: Verify built app
        run: |
          echo "Verifying built application..."
          
          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          ls -lh "$APP_PATH/Contents/Info.plist"
          
          npx asar extract "$APP_PATH/Contents/Resources/app.asar" /tmp/app-verify
          echo "Checking dependencies in built app:"
          cat /tmp/app-verify/package.json | grep -A 5 '"dependencies"'
          
          if grep -q "keytar" /tmp/app-verify/package.json; then
            echo "✅ Verified: keytar is present in built app"
          else
            echo "❌ ERROR: keytar missing from built app!"
            exit 1
          fi
          
          echo "Checking for native modules:"
          find "$APP_PATH" -name "*.node" || echo "No .node files found (good)"
          
          codesign -vvv "$APP_PATH"
          spctl -a -vvv "$APP_PATH"
          
          echo "✅ App verification complete"
      
      - name: Upload DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find_dmg.outputs.dmg_path }}
          asset_name: Truespan-Neighborhood-${{ needs.create-release.outputs.version }}-universal.dmg
          asset_content_type: application/x-apple-diskimage

      - name: Upload DMG to legacy release (optional)
        if: ${{ env.LEGACY_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
          LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
        run: |
          TAG="${{ needs.create-release.outputs.version }}"
          LEGACY_REPO="${LEGACY_RELEASE_REPO:-ryangalea23/truespan}"
          gh release upload "$TAG" "${{ steps.find_dmg.outputs.dmg_path }}" \
            --repo "$LEGACY_REPO" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    env:
      LEGACY_RELEASE_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
      LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup eSigner credentials
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.sign_windows == 'true'
        run: |
          echo "ESIGNER_USERNAME=${{ secrets.ESIGNER_USERNAME }}" >> $env:GITHUB_ENV
          echo "ESIGNER_PASSWORD=${{ secrets.ESIGNER_PASSWORD }}" >> $env:GITHUB_ENV
          echo "ESIGNER_CREDENTIAL_ID=${{ secrets.ESIGNER_CREDENTIAL_ID }}" >> $env:GITHUB_ENV
          echo "ESIGNER_TOTP_SECRET=${{ secrets.ESIGNER_TOTP_SECRET }}" >> $env:GITHUB_ENV
      
      - name: Build Windows app
        env:
          SKIP_SIGNING: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sign_windows == 'true' && '0' || '1' }}
        run: npm run build:win

      - name: Locate Windows installer
        id: find_windows_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "Windows installer not found in dist/"
            exit 1
          }
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      
      - name: Upload Windows Installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find_windows_installer.outputs.installer_path }}
          asset_name: Truespan-Neighborhood-Setup-${{ needs.create-release.outputs.version }}.exe
          asset_content_type: application/x-msdownload

      - name: Upload Windows Installer to legacy release (optional)
        if: ${{ env.LEGACY_RELEASE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.LEGACY_RELEASE_TOKEN }}
          LEGACY_RELEASE_REPO: ${{ secrets.LEGACY_RELEASE_REPO }}
        shell: pwsh
        run: |
          $tag = "${{ needs.create-release.outputs.version }}"
          $legacyRepo = if ($env:LEGACY_RELEASE_REPO) { $env:LEGACY_RELEASE_REPO } else { "ryangalea23/truespan" }
          gh release upload $tag "${{ steps.find_windows_installer.outputs.installer_path }}" `
            --repo $legacyRepo --clobber

