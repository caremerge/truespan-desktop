name: Build macOS Installer

permissions:
  contents: write

on:
  push:
    branches: [ main, production ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag to upload DMG to (e.g., v1.0.5)'
        required: false
        default: ''

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Verify icon files exist
      run: |
        echo "Checking for icon files..."
        ls -lh assets/icon.png assets/icon.ico
    
    - name: Clean previous builds
      run: |
        echo "Cleaning dist folder and build cache..."
        rm -rf dist
        rm -rf node_modules/.cache
        echo "Clean complete"
    
    - name: Reinstall dependencies after clean
      run: npm ci
    
    - name: Check system dependencies
      run: |
        echo "Checking system dependencies..."
        xcode-select --version || echo "Xcode command line tools not found"
        node --version
        npm --version
        echo "Checking for required system libraries..."
        otool -L /usr/lib/libc++.1.dylib || echo "libc++ not found"
        echo "System info:"
        uname -a
        sw_vers
    
    - name: Import Apple certificates
      env:
        APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
        APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Create keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        
        # Import certificate
        echo "$APPLE_CERT_DATA" > cert_base64.txt
        base64 --decode -i cert_base64.txt -o certificate.p12
        
        # Debug: Check if decode worked
        echo "Certificate file size:"
        ls -lh certificate.p12
        echo "Expected size: ~3.2KB"
        
        # Test password locally before importing
        echo "Testing password with openssl..."
        openssl pkcs12 -info -in certificate.p12 -noout -passin pass:"$APPLE_CERT_PASSWORD" || echo "Password test failed!"
        
        # Repackage the .p12 using OpenSSL to fix any format issues
        echo "Repackaging certificate for macOS compatibility..."
        openssl pkcs12 -in certificate.p12 -clcerts -nokeys -out cert.pem -passin pass:"$APPLE_CERT_PASSWORD"
        openssl pkcs12 -in certificate.p12 -nocerts -nodes -out key.pem -passin pass:"$APPLE_CERT_PASSWORD"
        openssl pkcs12 -export -out new_certificate.p12 -inkey key.pem -in cert.pem -passout pass:"$APPLE_CERT_PASSWORD" -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1
        
        # Import the repackaged certificate
        security import new_certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -A
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        
        # Cleanup
        rm certificate.p12
    
    - name: Build and sign macOS app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Ensure all dependencies are available
        npm run build:mac -- --publish never
        
        # Verify the app was built correctly
        echo "Verifying app structure..."
        find dist -name "*.app" -exec echo "Found app: {}" \;
        find dist -name "*.app" -exec ls -la {}/Contents/MacOS/ \;
        
        # Test if the app can run
        echo "Testing app execution..."
        APP_PATH=$(find dist -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Testing app at: $APP_PATH"
          timeout 10s "$APP_PATH/Contents/MacOS/Truespan Neighborhood" || echo "App test failed or timed out"
        fi
    
    - name: Verify built app
      run: |
        echo "Verifying built application..."
        
        # Find the built .app (it's in the dist folder before DMG is created)
        APP_PATH=$(find dist -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        
        # Verify the complete app structure
        echo "=== App Bundle Structure ==="
        ls -la "$APP_PATH/Contents/"
        echo ""
        echo "=== MacOS Folder ==="
        ls -la "$APP_PATH/Contents/MacOS/"
        echo ""
        echo "=== Resources Folder ==="
        ls -la "$APP_PATH/Contents/Resources/" | head -20
        echo ""
        
        # Check Info.plist timestamp
        ls -lh "$APP_PATH/Contents/Info.plist"
        
        # Verify the executable exists and is executable
        EXECUTABLE="$APP_PATH/Contents/MacOS/Truespan Neighborhood"
        if [ -f "$EXECUTABLE" ]; then
          echo "✅ Executable exists"
          ls -lh "$EXECUTABLE"
          file "$EXECUTABLE"
        else
          echo "❌ Executable NOT found at: $EXECUTABLE"
          exit 1
        fi
        
        # Extract and check package.json from app.asar
        if [ -f "$APP_PATH/Contents/Resources/app.asar" ]; then
          npx asar extract "$APP_PATH/Contents/Resources/app.asar" /tmp/app-verify
          echo "Checking dependencies in built app:"
          cat /tmp/app-verify/package.json | grep -A 5 '"dependencies"'
        else
          echo "❌ app.asar NOT found"
          exit 1
        fi
        
        # Verify keytar IS present
        if grep -q "keytar" /tmp/app-verify/package.json; then
          echo "✅ Verified: keytar is present in built app"
        else
          echo "❌ ERROR: keytar missing from built app!"
          exit 1
        fi
        
        # Check for any .node files
        echo "Checking for native modules:"
        find "$APP_PATH" -name "*.node" || echo "No .node files found (good)"
        
        # Verify code signature
        codesign -vvv "$APP_PATH"
        spctl -a -vvv "$APP_PATH"
        
        echo "✅ App verification complete"

    - name: Locate DMG
      id: find_dmg
      run: |
        DMG_PATH=$(find dist -maxdepth 2 -name "*.dmg" | head -1)
        if [ -z "$DMG_PATH" ]; then
          echo "DMG not found in dist/"
          exit 1
        fi
        echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT

    - name: Locate update ZIP + metadata
      id: find_update_assets
      run: |
        LATEST_YML=$(find dist -maxdepth 1 -name "latest-mac.yml" | head -1)
        if [ -z "$LATEST_YML" ]; then
          echo "latest-mac.yml not found in dist/"
          find dist -maxdepth 2 -type f -print
          exit 1
        fi

        UPDATE_NAME=$(sed -n 's/^path: //p' "$LATEST_YML" | head -1)
        if [ -z "$UPDATE_NAME" ]; then
          echo "Could not read update path from latest-mac.yml"
          cat "$LATEST_YML"
          exit 1
        fi

        ZIP_PATH=$(find dist -maxdepth 1 -name "*-mac.zip" | head -1)
        if [ -z "$ZIP_PATH" ]; then
          echo "Update ZIP not found in dist/"
          find dist -maxdepth 2 -type f -print
          exit 1
        fi

        BLOCKMAP_PATH=$(find dist -maxdepth 1 -name "*-mac.zip.blockmap" | head -1)
        if [ -z "$BLOCKMAP_PATH" ]; then
          echo "Blockmap not found in dist/"
          find dist -maxdepth 2 -type f -print
          exit 1
        fi

        TARGET_ZIP="dist/$UPDATE_NAME"
        TARGET_BLOCKMAP="${TARGET_ZIP}.blockmap"
        if [ "$(basename "$ZIP_PATH")" != "$UPDATE_NAME" ]; then
          cp "$ZIP_PATH" "$TARGET_ZIP"
        fi
        if [ "$(basename "$BLOCKMAP_PATH")" != "${UPDATE_NAME}.blockmap" ]; then
          cp "$BLOCKMAP_PATH" "$TARGET_BLOCKMAP"
        fi

        echo "zip_path=$TARGET_ZIP" >> $GITHUB_OUTPUT
        echo "blockmap_path=$TARGET_BLOCKMAP" >> $GITHUB_OUTPUT
        echo "latest_yml=$LATEST_YML" >> $GITHUB_OUTPUT

    - name: Upload release assets (DMG + auto-update)
      if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ inputs.release_tag }}"
        if [ -z "$TAG" ]; then
          TAG="${{ github.ref_name }}"
        fi
        if [ "$TAG" = "main" ] || [ -z "$TAG" ]; then
          echo "Release tag is not set (got: '$TAG'). Provide inputs.release_tag when dispatching."
          exit 1
        fi
        echo "Uploading DMG to release: $TAG"
        gh release upload "$TAG" "${{ steps.find_dmg.outputs.dmg_path }}" --clobber
        echo "Uploading auto-update assets to release: $TAG"
        gh release upload "$TAG" "${{ steps.find_update_assets.outputs.zip_path }}" --clobber
        gh release upload "$TAG" "${{ steps.find_update_assets.outputs.blockmap_path }}" --clobber
        gh release upload "$TAG" "${{ steps.find_update_assets.outputs.latest_yml }}" --clobber
    
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: ${{ steps.find_dmg.outputs.dmg_path }}

    - name: Upload auto-update assets
      uses: actions/upload-artifact@v4
      with:
        name: macos-update-assets
        path: |
          ${{ steps.find_update_assets.outputs.zip_path }}
          ${{ steps.find_update_assets.outputs.blockmap_path }}
          ${{ steps.find_update_assets.outputs.latest_yml }}
    
    - name: Create ZIP of app bundle
      run: |
        cd dist/mac-universal
        ditto -c -k --keepParent "Truespan Neighborhood.app" "TrueSpan-Living-${{ github.sha }}.zip"
        ls -lh "TrueSpan-Living-${{ github.sha }}.zip"
    
    - name: Upload app ZIP
      uses: actions/upload-artifact@v4
      with:
        name: macos-app-zip
        path: dist/mac-universal/*.zip
    
    - name: Upload raw app bundle for debugging
      uses: actions/upload-artifact@v4
      with:
        name: macos-app-bundle
        path: dist/mac-universal/*.app

