name: Build macOS Installer

on:
  push:
    branches: [ main, production ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Import Apple certificates
      env:
        APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
        APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Create keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        
        # Import certificate
        echo "$APPLE_CERT_DATA" > cert_base64.txt
        base64 --decode -i cert_base64.txt -o certificate.p12
        
        # Debug: Check if decode worked
        echo "Certificate file size:"
        ls -lh certificate.p12
        echo "Expected size: ~3.2KB"
        
        # Test password locally before importing
        echo "Testing password with openssl..."
        openssl pkcs12 -info -in certificate.p12 -noout -passin pass:"$APPLE_CERT_PASSWORD" || echo "Password test failed!"
        
        # Repackage the .p12 using OpenSSL to fix any format issues
        echo "Repackaging certificate for macOS compatibility..."
        openssl pkcs12 -in certificate.p12 -clcerts -nokeys -out cert.pem -passin pass:"$APPLE_CERT_PASSWORD" -passout pass:temp
        openssl pkcs12 -in certificate.p12 -nocerts -nodes -out key.pem -passin pass:"$APPLE_CERT_PASSWORD"
        openssl pkcs12 -export -out new_certificate.p12 -inkey key.pem -in cert.pem -passout pass:"$APPLE_CERT_PASSWORD" -legacy
        
        # Import the repackaged certificate
        security import new_certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -A
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        
        # Cleanup
        rm certificate.p12
    
    - name: Build and sign macOS app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        npm run build:mac
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-installer
        path: dist/*.dmg

